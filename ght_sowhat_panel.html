<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f5f0e8;font-family:'DM Sans',sans-serif;font-weight:300;height:100vh;display:flex;flex-direction:column;}
.hdr{background:#1a3a2a;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid #4a9e6b;flex-shrink:0;}
.hdr-title{font-family:'Bebas Neue',sans-serif;font-size:16px;color:#f5f0e8;letter-spacing:3px;}
.hdr-sub{font-family:'DM Mono',monospace;font-size:9px;color:#a8d5b5;letter-spacing:2px;text-transform:uppercase;}
.badge{background:#2d5c42;border:1px solid #4a9e6b;color:#a8d5b5;font-size:9px;font-family:'DM Mono',monospace;padding:2px 6px;letter-spacing:1px;margin-left:6px;vertical-align:middle;}
.body{padding:14px;flex:1;display:flex;flex-direction:column;gap:10px;overflow:auto;}
.loading{display:flex;align-items:center;gap:8px;font-family:'DM Mono',monospace;font-size:9px;color:#888;letter-spacing:1px;text-transform:uppercase;}
.loading.off{display:none;}
.dots span{display:inline-block;width:4px;height:4px;background:#4a9e6b;border-radius:50%;animation:bl 1.2s ease-in-out infinite;margin-right:2px;}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}
@keyframes bl{0%,80%,100%{opacity:.2}40%{opacity:1}}
.ctx-strip{background:white;border:1px solid #d0c8b8;border-left:3px solid #4a9e6b;padding:7px 10px;font-family:'DM Mono',monospace;font-size:10px;color:#666;line-height:1.6;}
.ctx-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#2d5c42;font-weight:500;margin-bottom:4px;display:block;}
.result{display:none;background:white;border:1px solid #d0c8b8;border-top:3px solid #4a9e6b;padding:12px 14px;flex:1;overflow:auto;}
.result.on{display:block;}
.result-tag{font-family:'Bebas Neue',sans-serif;font-size:9px;letter-spacing:2px;background:#1a3a2a;color:#f5f0e8;display:inline-block;padding:2px 7px;margin-bottom:10px;}
.result-text{font-size:12px;line-height:1.75;color:#2a2a2a;}
.result-text p{margin:0 0 8px;}
.result-text p:last-child{margin:0;}
.err{display:none;background:#fff5f5;border-left:3px solid #c0392b;padding:8px 10px;font-size:11px;color:#7a2020;font-family:'DM Sans',sans-serif;}
.err.on{display:block;}
.footer{font-family:'DM Mono',monospace;font-size:9px;color:#bbb;text-align:right;padding:6px 12px;border-top:1px solid #d0c8b8;flex-shrink:0;}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <span class="hdr-title">GHT Intel</span>
    <span class="badge">AI Analyst</span>
  </div>
  <div class="hdr-sub">So What Panel</div>
</div>

<div class="body">

  <div>
    <span class="ctx-lbl">Dashboard context</span>
    <div class="ctx-strip" id="ctx-display">Loading context...</div>
  </div>

  <div class="loading" id="loading">
    <div class="dots"><span></span><span></span><span></span></div>
    <span id="load-txt">Analyzing...</span>
  </div>

  <div class="err" id="err"></div>

  <div class="result" id="result">
    <div class="result-tag">GHT Sales Intelligence</div>
    <div class="result-text" id="result-text"></div>
  </div>

</div>

<div class="footer">GHT Intel &middot; Internal use only</div>

<script>
// ── CONTEXT ─────────────────────────────────────────────────────────────────
// Power BI injects the DAX measure value as the page's URL hash.
// Your DAX measure should look like:
//
//   AI_Panel = "BASE_HTML_URL#" & ENCODEURL(
//     "stems=" & FORMAT(SUM(...),"#,##0") &
//     "|invoice=$" & FORMAT(SUM(...),"#,##0") &
//     "|margin=" & FORMAT([Gross Margin %],"0.0%") & ...
//   )
//
// If no hash is present (standalone / test mode), a demo context is used.

const LOAD_MSGS = ['Analyzing...', 'Identifying signals...', 'Drafting the so what...'];
let mIdx = 0, mTimer = null;

function getContext() {
  const hash = decodeURIComponent(window.location.hash.replace('#',''));
  if (hash && hash.length > 10) return hash.replace(/\|/g, ' · ');
  // ── Demo fallback (replace with your DAX-fed values in production) ──
  return '4.0M stems · $1.28M invoice · 26.3% gross margin · Flora Atlantic $230K · FlorXpress $228K · GoldenOrchid $216K · Colombia 2.3M stems · Ecuador 1.7M stems · Season: All';
}

async function runAnalysis() {
  const ctx = getContext();
  document.getElementById('ctx-display').textContent = ctx;

  const loading = document.getElementById('loading');
  const loadTxt = document.getElementById('load-txt');
  loading.classList.remove('off');
  mIdx = 0;
  mTimer = setInterval(() => {
    mIdx = (mIdx + 1) % LOAD_MSGS.length;
    loadTxt.textContent = LOAD_MSGS[mIdx];
  }, 1800);

  const prompt = `You are a senior commercial analyst at GHT Corporation, a Miami-based B2B floral supply chain company connecting farms in Colombia (Cundinamarca, Antioquia) and Ecuador with US importers, wholesalers, bouquet shops, and retailers.

The following is live data from GHT's Power BI sales dashboard, reflecting whatever filters and slicers are currently active:

${ctx}

Give a sharp, senior-level "so what" — the 2-3 most commercially meaningful takeaways for GHT's leadership. Focus on implications, risks, opportunities, and actions — not descriptions. Use floral supply chain framing (stems, fixed vs open price, importer relationships, seasonality, sourcing origin, margin). Be direct and specific. Write 2-3 short paragraphs. No bullets, no headers, no preamble. Under 150 words. Sound like a sharp colleague, not a report.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 350,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await res.json();
    clearInterval(mTimer);
    loading.classList.add('off');

    if (!res.ok || data.error) {
      showErr('API error: ' + (data.error?.message || 'Unknown. Try reloading the visual.'));
      return;
    }

    const text = data.content.map(b => b.text || '').join('').trim();
    const html = text.split(/\n+/).filter(p => p.trim()).map(p => `<p>${p}</p>`).join('');
    document.getElementById('result-text').innerHTML = html;
    document.getElementById('result').classList.add('on');

  } catch (e) {
    clearInterval(mTimer);
    loading.classList.add('off');
    showErr('Error: ' + e.message);
  }
}

function showErr(m) { const el = document.getElementById('err'); el.textContent = m; el.classList.add('on'); }

// Auto-run on load — no button needed
window.addEventListener('load', runAnalysis);
</script>

</body>
</html>
